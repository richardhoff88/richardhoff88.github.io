# =============================================================
# BASIC SITE SETTINGS
# =============================================================

title: "Richard Hoffmann"
subtitle: "CS & CDS @ Caltech"
description: "My research, writing, and projects."
url: "https://richardhoff88.github.io"   # must match your GitHub Pages URL
baseurl: ""                               # MUST be empty for user.github.io sites

# =============================================================
# THEME CONFIGURATION
# =============================================================
theme: null                # al-folio manages its own theme (do NOT use 'jekyll-theme-primer')
remote_theme: null         # ensure GitHub Pages does NOT inject its own themes

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jekyll-toc
  - jekyll-last-modified-at

# =============================================================
# BUILD SETTINGS
# =============================================================
exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - ".github"
  - "vendor"

sass:
  style: compressed

# =============================================================
# NAVIGATION (example – edit however you want)
# =============================================================
navbar:
  - title: "About"
    url: /about/
  - title: "Research"
    url: /research/
  - title: "Projects"
    url: /projects/
  - title: "Blog"
    url: /blog/
  - title: "Publications"
    url: /publications/
  - title: "CV"
    url: /cv/

# =============================================================
# PROFILE INFO ON THE ABOUT PAGE
# =============================================================
profile:
  name: "Richard Hoffmann"
  image: "img/prof_pic.jpg"
  address: "Caltech"
  email: "your-email@caltech.edu"
  social:
    github: richardhoff88
    linkedin: "your-link"
    scholar: "your-google-scholar-id"

# =============================================================
# FOOTER
# =============================================================
footer:
  show_powered_by: false

# =============================================================
# MISC AL-FOLIO FEATURE FLAGS
# =============================================================
analytics:
  google: ""      # add tracking ID if you want analytics

# Enable table of contents on pages
toc:
  enabled: true
  h_min: 2
  h_max: 4
